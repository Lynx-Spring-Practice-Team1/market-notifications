services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_notifications_db
      POSTGRES_USER: market_notifications
      POSTGRES_PASSWORD: market_notifications
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_notifications -d market_notifications_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  redpanda-init:
    image: redpandadata/redpanda:v24.3.5
    depends_on:
      - redpanda
    entrypoint: ["/bin/sh", "-c"]
    command: >
      rpk --brokers redpanda:9092 topic create notification.created --if-not-exists

  market-notifications:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://market_notifications:market_notifications@postgres:5432/market_notifications_db
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_NOTIFICATION_TOPIC: notification.created
      MARKET_WS_ENABLED: "true"
      EXCHANGE_WS_URL: ws://exchange-server:8080/ws
      EXCHANGE_WS_API_KEY: test-api-key
      EXCHANGE_WS_API_SECRET: test-api-secret
      EXCHANGE_WS_RECONNECT_SECONDS: "5"
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

volumes:
  postgres-data:
